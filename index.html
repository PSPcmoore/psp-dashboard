<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<title>PSP Debug</title>
</head>
<body style="font-family:sans-serif;padding:2rem;max-width:600px">
<h2>PSP — API Debug</h2>
<label>API Key</label><br>
<input type="password" id="key" style="width:100%;padding:8px;margin:8px 0" placeholder="Paste API key"/><br>
<button onclick="test()" style="padding:10px 20px;background:#B47C2E;color:#fff;border:none;border-radius:6px;cursor:pointer">Test Connection</button>
<pre id="out" style="margin-top:1rem;background:#f5f5f5;padding:1rem;border-radius:6px;font-size:12px;white-space:pre-wrap;word-break:break-all"></pre>
<script>
async function test(){
  const key=document.getElementById('key').value.trim();
  const out=document.getElementById('out');
  out.textContent='Fetching...';
  try{
    const r=await fetch('/api/proxy/v2/lists/188584/list-entries?limit=1&fieldIds=field-3540606,field-3540607,field-3534994,field-5141571',{headers:{'x-affinity-key':key}});
    const d=await r.json();
    out.textContent=JSON.stringify(d,null,2);
  }catch(e){out.textContent='ERROR: '+e.message;}
}
</script>
</body>
</html>
